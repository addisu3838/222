<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chacha Dam · Income, Cost, Photos & Chat</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --tg-blue: #2AABEE;
      --tg-dark: #000000;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f4f5f7;
      --color-background-tertiary: #f0f2f5;
      --color-text-primary: #1f2a3a;
      --color-text-secondary: #07317a;
      --color-text-tertiary: #8e9db2;
      --color-border-tertiary: #e2e6ec;
      --border-radius-lg: 16px;
      --border-radius-md: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1e1e2a;
        --color-background-secondary: #2c2c38;
        --color-background-tertiary: #000000;
        --color-text-primary: #ffffff;
        --color-text-secondary: #b0b8c5;
        --color-text-tertiary: #7a8496;
        --color-border-tertiary: #2f3542;
      }
      .header { background: #000000;}
      .total-card { background: #0a0e14; }
      .bill-icon { background: rgba(42,171,238,0.18) !important; }
      .item-pill { background: #2a2e3c; border-color: #454b5e; }
      .clickable-card { background: #252836;}
      .breakdown-list { background: #1a1c26;}
      .chat-message-bot { background: #2c2c3e; }
      .chat-message-user { background: #0f3b5c; }
      .password-overlay { background: #1e1e2a; }
    }

    body {
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
      line-height: 1.1;
      padding-bottom: 90px;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
      background: var(--color-background-tertiary);
      min-height: 100vh;
    }
    .header{text-align: center; padding: 14px 20px 6px;}
    .header-title { font-size: 18px; font-weight: 600; }

    .summary-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px 16px 8px;
    }
    .stat-card {
      background: var(--color-background-primary);
      border-radius: var(--border-radius-lg);
      padding: 10px 16px;
      border: 0.5px solid var(--color-border-tertiary);
    }
    .stat-label {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .stat-val {
      font-size: 18px;
      font-weight: 500;
    }
    .stat-val.green { color: #1a9e5c; }
    .stat-val.red { color: #e06c5e; }

    .floating-tabs {
      position: fixed;
      bottom: 21px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      z-index: 999;
    }
    .tabs-inner {
      display: flex;
      gap: 4px;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: 80px;
      padding: 6px 8px;
      backdrop-filter: blur(12px);
    }
    .tab-btn {
      padding: 12px 20px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--tg-blue);
      color: #fff;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Bill Cards (Accordion) */
    .bill-card {
      background: var(--color-background-primary);
      border-radius: var(--border-radius-lg);
      border: 0.5px solid var(--color-border-tertiary);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .bill-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .bill-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bill-icon {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(42,171,238,0.12);
      color: var(--tg-blue);
    }
    .bill-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .bill-total {
      font-size: 15px;
      color: #1a9e5c;
      font-weight: 500;
      margin-top: 2px;
    }
    .bill-chevron {
      font-size: 18px;
      color: var(--color-text-tertiary);
      transition: transform 0.2s;
    }
    .bill-chevron.open {
      transform: rotate(180deg);
    }
    .bill-items {
      border-top: 0.5px solid var(--color-border-tertiary);
      display: none;
    }
    .bill-items.open {
      display: block;
    }
    .item-row {
      padding: 10px 16px;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .item-row:last-child { border-bottom: none; }
    .item-pill {
      background: var(--color-background-secondary);
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 30px;
      color: var(--color-text-secondary);
      flex-shrink: 0;
      border: 0.3px solid var(--color-border-tertiary);
      font-family: monospace;
    }
    .item-desc {
      font-size: 13px;
      line-height: 1.4;
      color: var(--color-text-primary);
      flex: 1;
    }
    .item-right {
      text-align: right;
      flex-shrink: 0;
      min-width: 85px;
    }
    .item-ach {
      font-size: 12px;
      color: var(--color-text-tertiary);
    }
    .item-inc {
      font-size: 14px;
      font-weight: 600;
      color: #1a9e5c;
    }

    /* Cost Panel */
    .cost-wrap { padding: 8px 16px 16px; }
    .sec-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--color-text-secondary);
      margin: 8px 4px 12px;
    }
    .clickable-card {
      background: var(--color-background-primary);
      border-radius: var(--border-radius-lg);
      border: 0.5px solid var(--color-border-tertiary);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .card-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .card-icon {
      width: 40px;
      height: 40px;
      background: var(--tg-blue);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .card-text h3 { font-size: 15px; font-weight: 600; }
    .card-text p { font-size: 13px; color: #1a9e5c; margin-top: 2px; font-weight: 500; }
    .card-chevron { font-size: 20px; color: var(--color-text-tertiary); transition: transform 0.2s; }
    .card-chevron.open { transform: rotate(180deg); }
    .breakdown-list {
      display: none;
      border-top: 0.5px solid var(--color-border-tertiary);
      background: var(--color-background-secondary);
      max-height: 350px;
      overflow-y: auto;
    }
    .breakdown-list.open { display: block; }
    .breakdown-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      font-size: 13px;
    }
    .item-name { color: var(--color-text-secondary); flex: 1; }
    .item-amount { font-weight: 600; color: #1a9e5c; white-space: nowrap; }

    /* Password Overlay for Cost Tab */
    .password-overlay {
      position: relative;
      background: var(--color-background-primary);
      border-radius: var(--border-radius-lg);
      padding: 32px 20px;
      text-align: center;
      margin: 16px;
    }
    .password-overlay h3 {
      margin-bottom: 20px;
      font-size: 18px;
    }
    .password-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 30px;
      border: 1px solid var(--color-border-tertiary);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      font-size: 16px;
      text-align: center;
      margin-bottom: 16px;
      outline: none;
    }
    .password-input:focus {
      border-color: var(--tg-blue);
    }
    .password-btn {
      background: var(--tg-blue);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .password-error {
      color: #e06c5e;
      font-size: 12px;
      margin-top: 12px;
    }
    .cost-protected-content {
      display: block;
    }
    .cost-protected-content.locked {
      display: none;
    }
    .cost-unlock-message {
      display: none;
    }
    .cost-unlock-message.visible {
      display: block;
    }

    /* Photos Panel */
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 16px;
    }
    .photo-card {
      background: var(--color-background-primary);
      border-radius: var(--border-radius-lg);
      border: 0.5px solid var(--color-border-tertiary);
      overflow: hidden;
      cursor: pointer;
    }
    .photo-card img {
      width: 100;
      height: 150px;
      object-fit: cover;
      display: block;
    }
    .photo-caption {
      padding: 6px 8px;
      font-size: 11px;
      color: var(--color-text-secondary);
      text-align: center;
      border-top: 0.5px solid var(--color-border-tertiary);
    }
    .photos-section-title {
      font-size: 14px;
      font-weight: 600;
      padding: 16px 16px 0;
    }
    .photos-subtitle {
      font-size: 11px;
      color: var(--color-text-tertiary);
      padding: 4px 16px;
    }
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 90%; max-height: 90%; border-radius: 12px; }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 28px;
      width: 40px;
      height: 40px;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Chat Panel */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 200px);
      min-height: 400px;
      padding: 16px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }
    .chat-message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
    }
    .chat-message-user {
      align-self: flex-end;
      background: var(--tg-blue);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .chat-message-bot {
      align-self: flex-start;
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      border-bottom-left-radius: 4px;
    }
    .chat-input-area {
      display: flex;
      gap: 10px;
      background: var(--color-background-primary);
      padding: 10px;
      border-radius: 30px;
      border: 0.5px solid var(--color-border-tertiary);
    }
    .chat-input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 10px;
      font-size: 14px;
      outline: none;
      color: var(--color-text-primary);
    }
    .chat-send-btn {
      background: var(--tg-blue);
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .chat-send-btn:active { opacity: 0.8; }
    .chat-note {
      font-size: 10px;
      color: var(--color-text-tertiary);
      text-align: center;
      margin-top: 8px;
    }

    .total-card {
      background: var(--tg-dark);
      border-radius: var(--border-radius-lg);
      padding: 16px 20px;
      margin: 16px 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-lbl { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.75); }
    .total-val { font-size: 18px; font-weight: 700; color: white; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; }
  </style>
</head>
<body>
<h2 class="sr-only"> </h2>
<div class="wrap">
  <div class="header">
    <div class="header-title"></div>
  </div>

  <div class="summary-row">
    <div class="stat-card">
      <div class="stat-label">📈 Total Income</div>
      <div class="stat-val green" id="totalIncome">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📉 Total Cost</div>
      <div class="stat-val red">404,850,157.00 ETB</div>
    </div>
  </div>

  <!-- Income Panel -->
  <div id="panel-income" class="tab-panel active">
    <div class="section" style="padding: 6px 16px 0;">
      <div id="billsContainer"></div>
    </div>
  </div>

  <!-- Cost Panel (Password Protected) -->
  <div id="panel-cost" class="tab-panel">
    <div id="costContentWrapper">

  <!-- Photos Panel -->
  <div id="panel-photos" class="tab-panel">
    <div class="photos-section-title">📸 Project Photos</div>

    <div class="photos-grid" id="photosGrid"></div>
  </div>

  <!-- Chat Panel -->
  <div id="panel-chat" class="tab-panel">
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-message chat-message-bot">👋 Hello! Welcome to Chacha Dam Project support. Ask me anything about the project!</div>
      </div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="chat-send-btn" onclick="sendMessage()">Send</button>
      </div>
      <div class="chat-note">💡 Messages are stored locally. Contact project team for official inquiries.</div>
    </div>
  </div>

</div>

<div class="floating-tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" id="nav-income" onclick="switchTab('income')">💰 Income</button>
    <button class="tab-btn" id="nav-cost" onclick="switchTab('cost')">📊 Cost</button>
    <button class="tab-btn" id="nav-photos" onclick="switchTab('photos')">📸 Photos</button>
    <button class="tab-btn" id="nav-chat" onclick="switchTab('chat')">💬 Chat</button>
  </div>
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">×</span>
  <img id="lightboxImg" src="" alt="">
</div>

  function fmt(v) { return v == null ? '—' : parseFloat(v).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtA(v) { if (v == null) return '—'; let n = parseFloat(v); return isNaN(n) ? v : (n % 1 === 0 ? n.toString() : n.toFixed(2)); }
  function fmtM(v) { let n = parseFloat(v); if (isNaN(n)) return '—'; if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B'; if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M'; if (n >= 1e3) return (n / 1e3).toFixed(0) + 'K'; return n.toFixed(0); }

  // Total Income
  let totalIncome = 0;
  bills.forEach(bill => { bill.items.forEach(item => { if (item.inc) totalIncome += item.inc; }); });
  document.getElementById('totalIncome').innerHTML = fmt(totalIncome) + ' ETB';

  // Render Income Bills
  const container = document.getElementById('billsContainer');
  container.innerHTML = '';
  bills.forEach((bill, idx) => {
    let billTotal = 0;
    bill.items.forEach(it => { if (it.inc) billTotal += it.inc; });
    const card = document.createElement('div'); card.className = 'bill-card';
    const itemsHtml = bill.items.map(it => `<div class="item-row"><span class="item-pill">${it.no || '—'}</span><span class="item-desc">${it.d}</span><div class="item-right"><div class="item-ach">${fmtA(it.ach)}</div><div class="item-inc">${it.inc ? fmt(it.inc) : '—'}</div></div></div>`).join('');
    card.innerHTML = `<div class="bill-header" data-bill-idx="${idx}"><div class="bill-header-left"><div class="bill-icon" style="background:${bill.color}20; color:${bill.color};">${bill.icon}</div><div><div class="bill-name">Bill ${bill.id} — ${bill.name}</div><div class="bill-total">${fmtM(billTotal)} ETB</div></div></div><span class="bill-chevron" id="chev-${idx}">▼</span></div><div class="bill-items" id="items-${idx}">${itemsHtml}</div>`;
    container.appendChild(card);
    const header = card.querySelector('.bill-header');
    const itemsDiv = card.querySelector(`#items-${idx}`);
    const chevron = card.querySelector(`#chev-${idx}`);
    header.addEventListener('click', () => { itemsDiv.classList.toggle('open'); chevron.classList.toggle('open'); });
  });

  // Show password prompt
  function showPasswordPrompt() {
    const wrapper = document.getElementById('costContentWrapper');
    if (!wrapper) return;
    
    wrapper.innerHTML = `
      <div class="password-overlay">
        <h3>🔒 የወጭ መረጃ ተጠብቋል</h3>
        <p style="margin-bottom: 20px; font-size: 14px; color: var(--color-text-secondary);">እባክዎ ፓስወርድ ያስገቡ</p>
        <input type="password" id="costPasswordInput" class="password-input" placeholder="Enter password" autocomplete="off">
        <button id="unlockCostBtn" class="password-btn">🔓 ክፈት</button>
        <div id="passwordErrorMsg" class="password-error"></div>
      </div>
    `;
    
    const input = document.getElementById('costPasswordInput');
    const btn = document.getElementById('unlockCostBtn');
    const errorDiv = document.getElementById('passwordErrorMsg');
    
    const unlock = () => {
      const enteredPassword = input.value.trim();
      if (enteredPassword === COST_PASSWORD) {
        isCostUnlocked = true;
        renderCostContent();
      } else {
        errorDiv.textContent = '❌ የተሳሳተ ፓስወርድ! እንደገና ይሞክሩ.';
        input.value = '';
        input.focus();
      }
    };
    
    btn.addEventListener('click', unlock);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') unlock();
    });
    input.focus();
  }

  function openLightbox(imgUrl) {
    const lightbox = document.getElementById('lightbox');

  function closeLightbox() { document.getElementById('lightbox')?.classList.remove('active'); }

  // Chat functions
  function sendMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    if(!message) return;
    const messagesDiv = document.getElementById('chatMessages');
    const userMsgDiv = document.createElement('div');
    userMsgDiv.className = 'chat-message chat-message-user';
    userMsgDiv.textContent = message;
    messagesDiv.appendChild(userMsgDiv);
    input.value = '';
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    setTimeout(() => {
      const botMsgDiv = document.createElement('div');
      botMsgDiv.className = 'chat-message chat-message-bot';
      botMsgDiv.textContent = getBotReply(message);
      messagesDiv.appendChild(botMsgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }, 500);
  }

  function getBotReply(msg) {
    const lowerMsg = msg.toLowerCase();
    if(lowerMsg.includes('cost') || lowerMsg.includes('budget')) return "💰 Total project cost is 404,850,157 ETB. For detailed breakdown, check the Cost tab (password protected).";
    if(lowerMsg.includes('income') || lowerMsg.includes('payment')) return "📈 Total contract income is " + fmt(totalIncome) + " ETB. See Income tab for bill details.";
    if(lowerMsg.includes('schedule') || lowerMsg.includes('timeline')) return "📅 The project follows the approved construction schedule. Contact the project manager for specific dates.";
    if(lowerMsg.includes('contact') || lowerMsg.includes('support')) return "📞 For official inquiries, please contact the project administration office.";
    if(lowerMsg.includes('password') || lowerMsg.includes('unlock')) return "🔒 The Cost tab is password protected. Please ask the project administrator for access.";
    return "✅ Thank you for your message. A project representative will respond shortly. For urgent matters, contact the site.";
  }

  // Tab switching with cost panel protection
  function switchTab(tab) {
    const panels = ['income', 'cost', 'photos', 'chat'];
    panels.forEach(t => {
      document.getElementById(`panel-${t}`)?.classList.remove('active');
      document.getElementById(`nav-${t}`)?.classList.remove('active');
    });
    document.getElementById(`panel-${tab}`)?.classList.add('active');
    document.getElementById(`nav-${tab}`)?.classList.add('active');
    
    // If switching to cost tab, refresh the panel (check lock status)
    if (tab === 'cost') {
      refreshCostPanel();
    }
  }

  // Initialize cost panel on page load (but not auto-unlocked)
  // We'll set initial state as locked
  isCostUnlocked = false;
  
  // Store unlock state in sessionStorage to persist during session (optional)
  // Check if previously unlocked in this session
  try {
    if (sessionStorage.getItem('chacha_cost_unlocked') === 'true') {
      isCostUnlocked = true;
    }
  } catch(e) { /* ignore */ }
  
  // Override unlock to save to sessionStorage
  const originalRenderCostContent = renderCostContent;
  renderCostContent = function() {
    originalRenderCostContent();
    try {
      sessionStorage.setItem('chacha_cost_unlocked', 'true');
    } catch(e) {}
  };
  
  // Initial cost panel setup (starts locked)
  refreshCostPanel();

  // Telegram WebApp integration
  if(window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.expand();

    Telegram.WebApp.ready();
