<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chacha</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --tg-bg: var(--tg-theme-bg-color, #ffffff);
      --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #f4f5f7);
      --tg-section-bg: var(--tg-theme-section-bg-color, #f0f2f5);
      --tg-text: var(--tg-theme-text-color, #1f2a3a);
      --tg-hint: var(--tg-theme-hint-color, #8e9db2);
      --tg-link: var(--tg-theme-link-color, #2AABEE);
      --tg-button: var(--tg-theme-button-color, #3cec2c);
      --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
      --border-subtle: rgba(0, 0, 0, 0.08);
      --border-radius-lg: 16px;
      --border-radius-md: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --tg-bg: #1c1c1e;
        --tg-secondary-bg: #2c2c2e;
        --tg-section-bg: #0e0e10;
        --tg-text: #ffffff;
        --tg-hint: #8e8e93;
        --border-subtle: rgba(255, 255, 255, 0.1);
      }
    }

    body {
      background: var(--tg-section-bg);
      color: var(--tg-text);
      line-height: 1.2;
      padding-bottom: 88px;
      margin: 0;
      overflow: hidden;
    }

    /* ========== SPLASH SCREEN ========== */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      background: var(--tg-section-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease-out;
    }
    #splashScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .splash-image {
      width: 80%;
      max-width: 400px;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      margin-bottom: 16px;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .splash-image.active {
      opacity: 1;
    }
    .splash-title {
      position: absolute;
      bottom: 15%;
      font-size: 24px;
      font-weight: 700;
      color: var(--tg-text);
      letter-spacing: 2px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .splash-sub {
      position: absolute;
      bottom: 10%;
      font-size: 12px;
      color: var(--tg-hint);
      letter-spacing: 1px;
    }
    .splash-loader {
      position: absolute;
      bottom: 5%;
      width: 40px;
      height: 4px;
      background: var(--tg-hint);
      border-radius: 4px;
      overflow: hidden;
    }
    .splash-loader::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      background: var(--tg-button);
      border-radius: 4px;
      animation: loading 1.2s ease-in-out infinite;
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* ========== MAIN APP (hidden initially) ========== */
    #mainApp {
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease-in;
    }
    #mainApp.visible {
      display: block;
      opacity: 1;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
      background: transparent;
      min-height: 100vh;
    }

    .header {
      padding: 12px 16px 4px;
      text-align: center;
    }
    .header-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--tg-text);
    }

    /* summary cards - now separated per tab context */
    .summary-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 8px 8px 8px;      
    }
    .stat-card {
      background: var(--tg-bg);
      padding: 12px 12px;
      border: 0.5px solid var(--border-subtle);
      right: 0;
      display: flex;
      justify-content: center;
      border-radius: 555px;
      letter-spacing: 0.2px;
    }
    .stat-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--tg-hint);
      margin-bottom: 9px;
      display: flex;
      align-items: center;
      gap: auto;
      position: relative;
    }
    .stat-val {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.3px;
     
    }
    .stat-val.green { color: #4e5c52; }
    .stat-val.red { color: #ff5e5e; }

    /* Income hero card */
    .income-hero {
      position: center;
      margin: 8px 8px 4px;
      padding: 22px 20px;
      border-radius: 22px;
      background: linear-gradient(135deg, #1f9d55 0%, #16a34a 45%, #0d8a47 100%);
      color: black;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(22, 163, 74, 0.28);
    }
    .income-hero::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 140px;
      height: 140px;
      background: rgba(255,255,255,0.10);
      border-radius: 50%;
    }
    .income-hero::after {
      content: '';
      position: absolute;
      bottom: -50px;
      right: 30px;
      width: 110px;
      height: 110px;
      background: rgba(255,255,255,0.07);
      border-radius: 50%;
    }
    .income-hero-top {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }
    .income-hero-icon {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .income-hero-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
    }
    .income-hero-amount {
      position: relative;
      z-index: 1;
      margin-top: 14px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .income-hero-amount .currency {
      font-size: z4px;
      font-weight: 600;
      color: rgba(114, 6, 6, 0.75);
    }
    .income-hero-sub {
      position: relative;
      z-index: 1;
      margin-top: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* bottom tab bar */
    .floating-tabs {
      position: fixed;
      bottom: calc(10px + env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      z-index: 1000;
    }
    .tabs-inner {
      display: flex;
      gap: 2px;
      background: black;
      border: 0.5px solid var(--border-subtle);
      border-radius: 40px;
      padding: 6px 11px;
      padding-bottom: calc(6px + env(safe-area-inset-bottom));
      backdrop-filter: blur(24px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }
    .tab-btn {
      padding: 9px 9px;
      border-radius: 32px;
      font-size: 12px;
      font-weight: 590;
      border: none;
      background: transparent;
      color: var(--tg-hint);
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: -0.2px;
    }
    .tab-btn.active {
      background: var(--tg-button);
      color: var(--tg-button-text);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Bill Cards */
    .bill-card {
      background: var(--tg-bg);
      border-radius: var(--border-radius-lg);
      border: 0.5px solid var(--border-subtle);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .bill-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    .bill-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bill-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: rgba(42, 171, 238, 0.12);
    }
    .bill-name {
      font-size: 15px;
      font-weight: 600;
    }
    .bill-total {
      font-size: 13px;
      color: #35c759;
      font-weight: 500;
      margin-top: 2px;
    }
    .bill-chevron {
      font-size: 18px;
      color: var(--tg-hint);
      transition: transform 0.2s;
    }
    .bill-chevron.open { transform: rotate(180deg); }
    .bill-items {
      border-top: 0.5px solid var(--border-subtle);
      display: none;
      background: var(--tg-secondary-bg);
    }
    .bill-items.open { display: block; }
    .item-row {
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--border-subtle);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .item-row:last-child { border-bottom: none; }
    .item-pill {
      background: var(--tg-section-bg);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      color: var(--tg-hint);
      flex-shrink: 0;
      font-family: monospace;
    }
    .item-desc {
      font-size: 13px;
      line-height: 1.4;
      flex: 1;
    }
    .item-right {
      text-align: right;
      flex-shrink: 0;
      min-width: 85px;
    }
    .item-ach {
      font-size: 11px;
      color: var(--tg-hint);
    }
    .item-inc {
      font-size: 14px;
      font-weight: 600;
      color: #35c759;
    }

    /* Cost Panel */
    .cost-wrap { padding: 8px 16px 24px; }
    .sec-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: var(--tg-hint);
      margin: 8px 4px 12px;
      text-transform: uppercase;
    }
    .clickable-card {
      background: var(--tg-bg);
      border-radius: var(--border-radius-lg);
      border: 0.5px solid var(--border-subtle);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .card-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .card-icon {
      width: 44px;
      height: 44px;
      background: rgba(42, 171, 238, 0.12);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .card-text h3 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .card-text p { font-size: 13px; color: #35c759; font-weight: 500; }
    .card-chevron {
      font-size: 20px;
      color: var(--tg-hint);
      transition: transform 0.2s;
    }
    .card-chevron.open { transform: rotate(180deg); }
    .breakdown-list {
      display: none;
      border-top: 0.5px solid var(--border-subtle);
      background: var(--tg-secondary-bg);
      max-height: 320px;
      overflow-y: auto;
    }
    .breakdown-list.open { display: block; }
    .breakdown-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--border-subtle);
      font-size: 13px;
    }
    .item-name { color: var(--tg-hint); flex: 1; }
    .item-amount { font-weight: 600; color: #35c759; white-space: nowrap; }

    /* Password Overlay (unified) */
    .password-overlay {
      background: var(--tg-bg);
      border-radius: var(--border-radius-lg);
      padding: 32px 20px;
      text-align: center;
      margin: 16px;
      border: 0.5px solid var(--border-subtle);
    }
    .password-overlay h3 {
      margin-bottom: 8px;
      font-size: 19px;
      font-weight: 600;
    }
    .password-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 40px;
      border: 0.5px solid var(--border-subtle);
      background: var(--tg-secondary-bg);
      color: var(--tg-text);
      font-size: 16px;
      text-align: center;
      margin: 18px 0 12px;
      outline: none;
    }
    .password-input:focus { border-color: var(--tg-link); }
    .password-btn {
      background: var(--tg-button);
      color: var(--tg-button-text);
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .password-error {
      color: #ff5e5e;
      font-size: 12px;
      margin-top: 12px;
    }

    /* Photos Grid */
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 20px;
    }
    .photo-card {
      background: var(--tg-bg);
      border-radius: 18px;
      border: 0.5px solid var(--border-subtle);
      overflow: hidden;
      cursor: pointer;
    }
    .photo-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      background: #2c2c2e;
    }
    .photo-caption {
      padding: 8px 6px;
      font-size: 11px;
      color: var(--tg-hint);
      text-align: center;
      border-top: 0.5px solid var(--border-subtle);
    }
    .photos-section-title {
      font-size: 15px;
      font-weight: 600;
      padding: 18px 20px 0;
    }
    .photos-subtitle {
      font-size: 11px;
      color: var(--tg-hint);
      padding: 4px 20px;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      z-index: 1100;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      touch-action: none;
    }
    .lightbox.active { display: flex; }
    .lightbox-img-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 85%;
      border-radius: 24px;
      transform-origin: center center;
      transition: transform 0.15s ease-out;
      will-change: transform;
      user-select: none;
      -webkit-user-drag: none;
    }
    .lightbox img.dragging { transition: none; }
    .lightbox-close {
      position: absolute;
      top: 28px;
      right: 24px;
      color: white;
      font-size: 32px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1101;
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      font-size: 28px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1101;
      user-select: none;
    }
    .lightbox-nav.prev { left: 14px; }
    .lightbox-nav.next { right: 14px; }
    .lightbox-counter {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 13px;
      background: rgba(255,255,255,0.15);
      padding: 6px 14px;
      border-radius: 20px;
      z-index: 1101;
    }
    .lightbox-caption {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 12px;
      background: rgba(0,0,0,0.4);
      padding: 6px 14px;
      border-radius: 20px;
      max-width: 80%;
      text-align: center;
      z-index: 1101;
    }

    /* Chat Panel (protected style) */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 210px);
      min-height: 460px;
      padding: 16px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
      padding-right: 4px;
    }
    .chat-message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }
    .chat-message-user {
      align-self: flex-end;
      background: var(--tg-button);
      color: var(--tg-button-text);
      border-bottom-right-radius: 4px;
    }
    .chat-message-bot {
      align-self: flex-start;
      background: var(--tg-bg);
      color: var(--tg-text);
      border-bottom-left-radius: 4px;
      border: 0.3px solid var(--border-subtle);
    }
    .chat-input-area {
      display: flex;
      gap: 10px;
      background: var(--tg-bg);
      padding: 8px 12px;
      border-radius: 34px;
      border: 0.5px solid var(--border-subtle);
    }
    .chat-input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 10px 6px;
      font-size: 15px;
      outline: none;
      color: var(--tg-text);
    }
    .chat-send-btn {
      background: var(--tg-button);
      border: none;
      padding: 8px 22px;
      border-radius: 32px;
      color: var(--tg-button-text);
      font-weight: 600;
      cursor: pointer;
    }
    .chat-note {
      font-size: 10px;
      color: var(--tg-hint);
      text-align: center;
      margin-top: 8px;
    }
    .total-card {
      background: var(--tg-bg);
      border-radius: var(--border-radius-lg);
      padding: 16px 20px;
      margin: 16px 16px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 0.5px solid var(--border-subtle);
    }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; }
  </style>
</head>
<body>

<!-- ========== SPLASH SCREEN ========== -->
<div id="splashScreen">
  <img src="index.png" alt="Chacha Dam" class="splash-image active" id="splashImg1">
  <img src="index2.jpg" alt="Chacha Dam" class="splash-image" id="splashImg2">
  <div class="splash-title">🏗️ Chacha Dam</div>
  <div class="splash-sub">የቻቻ ግድብ ፕሮጀክት</div>
  <div class="splash-loader"></div>
</div>

<!-- ========== MAIN APP ========== -->
<div id="mainApp">
<div class="wrap">

  <div id="incomeSummary" class="summary-row" style="display: none;"></div>
  <div id="costSummary" class="summary-row" style="display: none;"></div>

  <div id="panel-income" class="tab-panel active">
    <div id="incomeSummaryTarget"></div>
    <div style="padding: 6px 16px 12px;">
      <div id="billsContainer"></div>
    </div>
  </div>

  <div id="panel-cost" class="tab-panel">
    <div id="costSummaryTarget"></div>
    <div id="costContentWrapper"></div>
  </div>

  <div id="panel-photos" class="tab-panel">
    <div class="photos-section-title">📸 Project Gallery</div>
    <div class="photos-subtitle">Tap image to expand</div>
    <div class="photos-grid" id="photosGrid"></div>
  </div>

  <div id="panel-chat" class="tab-panel">
    <div id="chatProtectedWrapper"></div>
  </div>
</div>

<div class="floating-tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" id="nav-income" onclick="switchTab('income')">Income</button>
    <button class="tab-btn" id="nav-cost" onclick="switchTab('cost')">Cost</button>
    <button class="tab-btn" id="nav-photos" onclick="switchTab('photos')">Photos</button>
    <button class="tab-btn" id="nav-chat" onclick="switchTab('chat')"> Chat</button>
  </div>
</div>

<div id="lightbox" class="lightbox">
  <span class="lightbox-close" onclick="closeLightbox()">✕</span>
  <span class="lightbox-nav prev" id="lightboxPrev" onclick="navLightbox(-1)">‹</span>
  <span class="lightbox-nav next" id="lightboxNext" onclick="navLightbox(1)">›</span>
  <div class="lightbox-img-wrap" id="lightboxImgWrap">
    <img id="lightboxImg" src="" alt="">
  </div>
  <div class="lightbox-caption" id="lightboxCaption"></div>
  <div class="lightbox-counter" id="lightboxCounter"></div>
</div>
</div>

<script>
  // ========== SPLASH SCREEN ==========
  (function showSplash() {
    const splash = document.getElementById('splashScreen');
    const img1 = document.getElementById('splashImg1');
    const img2 = document.getElementById('splashImg2');
    const mainApp = document.getElementById('mainApp');
    let currentImg = 1;
    let count = 0;

    // Show first image immediately
    img1.classList.add('active');
    
    // Switch to second image after 1.5 seconds
    const switchInterval = setInterval(() => {
      if (currentImg === 1) {
        img1.classList.remove('active');
        img2.classList.add('active');
        currentImg = 2;
      } else {
        img2.classList.remove('active');
        img1.classList.add('active');
        currentImg = 1;
      }
      count++;
      
      // After 3 seconds (2 switches), hide splash and show main app
      if (count >= 2) {
        clearInterval(switchInterval);
        // Fade out splash
        splash.classList.add('hidden');
        // Show main app
        mainApp.style.display = 'block';

  (function setupLightboxTouch() {
    const lb = document.getElementById('lightbox');

    if (!lb || !img) return;

    function dist(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

      if (e.touches.length === 2) {
        lbStartDist = dist(e.touches);
        lbStartScale = lbScale;
        lbIsSwipe = false;

          if (lbScale > 1) { resetLbTransform(); }
          else { lbScale = 2; applyLbTransform(); }
          lbLastTap = 0;
          return;
        }
        lbLastTap = now;

        if (lbScale > 1) {
          lbDragging = true;
          lbStartX = e.touches[0].clientX;
          lbStartY = e.touches[0].clientY;
          lbStartTx = lbTx;
          lbStartTy = lbTy;
          img.classList.add('dragging');
        } else {
          lbSwipeStartX = e.touches[0].clientX;
          lbSwipeStartY = e.touches[0].clientY;
          lbIsSwipe = true;
          img.classList.add('dragging');
        }
      }
    }, { passive: true });

    lb.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        const newDist = dist(e.touches);
        if (lbStartDist > 0) {
          lbScale = Math.min(Math.max(lbStartScale * (newDist / lbStartDist), 1), 4);
          applyLbTransform();
        }
      } else if (e.touches.length === 1) {
        if (lbDragging && lbScale > 1) {
          const dx = e.touches[0].clientX - lbStartX;
          const dy = e.touches[0].clientY - lbStartY;
          lbTx = lbStartTx + dx;
          lbTy = lbStartTy + dy;
          applyLbTransform();
        } else if (lbIsSwipe) {
          const dx = e.touches[0].clientX - lbSwipeStartX;
          const dy = e.touches[0].clientY - lbSwipeStartY;
          if (Math.abs(dx) > Math.abs(dy)) {
            lbTx = dx;
            applyLbTransform();
          }
        }
      }
    }, { passive: true });

    lb.addEventListener('touchend', (e) => {
      img.classList.remove('dragging');
      if (lbScale <= 1 && lbIsSwipe) {
        const dx = lbTx;
        if (dx > 60) { navLightbox(-1); }
        else if (dx < -60) { navLightbox(1); }
        else { lbTx = 0; applyLbTransform(); }
      }
      if (lbScale <= 1) { lbTx = 0; lbTy = 0; if(!lbIsSwipe) applyLbTransform(); }
      lbDragging = false;
      lbIsSwipe = false;
      lbStartDist = 0;
    });

    lb.addEventListener('click', (e) => {
      if (e.target === lb) closeLightbox();
    });
  })();

  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') closeLightbox();
    if(document.getElementById('lightbox')?.classList.contains('active')) {
      if(e.key === 'ArrowLeft') navLightbox(-1);
      if(e.key === 'ArrowRight') navLightbox(1);
    }
  });
</script>
</body>
