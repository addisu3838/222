<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chacha Dam · Income, Cost, Photos & Chat</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --tg-bg: var(--tg-theme-bg-color, #ffffff);
      --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #f4f5f7);
      --tg-section-bg: var(--tg-theme-section-bg-color, #f0f2f5);
      --tg-text: var(--tg-theme-text-color, #1f2a3a);
      --tg-hint: var(--tg-theme-hint-color, #8e9db2);
      --tg-link: var(--tg-theme-link-color, #2AABEE);
      --tg-button: var(--tg-theme-button-color, #2AABEE);
      --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
      --border-subtle: rgba(0, 0, 0, 0.08);
      --border-radius-lg: 16px;
      --border-radius-md: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --tg-bg: #1c1c1e;
        --tg-secondary-bg: #2c2c2e;
        --tg-section-bg: #0e0e10;
        --tg-text: #ffffff;
        --tg-hint: #8e8e93;
        --border-subtle: rgba(255, 255, 255, 0.1);
      }
    }

    body {
      background: var(--tg-section-bg);
      color: var(--tg-text);
      line-height: 1.2;
      padding-bottom: 88px;
      margin: 0;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
      background: transparent;
      min-height: 100vh;
    }

    .header {
      padding: 12px 16px 4px;
      text-align: center;
    }
    .header-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--tg-text);
    }

    .summary-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 12px 16px 8px;
    }
    .stat-card {
      background: var(--tg-bg);
      border-radius: var(--border-radius-lg);
      padding: 12px 16px;
      border: 0.5px solid var(--border-subtle);
    }
    .stat-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--tg-hint);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-val {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .stat-val.green { color: #35c759; }
    .stat-val.red { color: #ff5e5e; }

    .floating-tabs {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      z-index: 1000;
    }
    .tabs-inner {
      display: flex;
      gap: 6px;
      background: var(--tg-bg);
      border: 0.5px solid var(--border-subtle);
      border-radius: 40px;
      padding: 6px 8px;
      backdrop-filter: blur(24px);
      background-color: rgba(var(--tg-bg-rgb, 255,255,255), 0.92);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .tab-btn {
      padding: 8px 18px;
      border-radius: 32px;
      font-size: 14px;
      font-weight: 590;
      border: none;
      background: transparent;
      color: var(--tg-hint);
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: -0.2px;
    }
    .tab-btn.active {
      background: var(--tg-button);
      color: var(--tg-button-text);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .bill-card {
      background: var(--tg-bg);
      border-radius: var(--border-radius-lg);
      border: 0.5px solid var(--border-subtle);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .bill-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    .bill-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bill-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: rgba(42, 171, 238, 0.12);
    }
    .bill-name {
      font-size: 15px;
      font-weight: 600;
    }
    .bill-total {
      font-size: 13px;
      color: #35c759;
      font-weight: 500;
      margin-top: 2px;
    }
    .bill-chevron {
      font-size: 18px;
      color: var(--tg-hint);
      transition: transform 0.2s;
    }
    .bill-chevron.open { transform: rotate(180deg); }
    .bill-items {
      border-top: 0.5px solid var(--border-subtle);
      display: none;
      background: var(--tg-secondary-bg);
    }
    .bill-items.open { display: block; }
    .item-row {
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--border-subtle);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .item-row:last-child { border-bottom: none; }
    .item-pill {
      background: var(--tg-section-bg);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      color: var(--tg-hint);
      flex-shrink: 0;
      font-family: monospace;
    }
    .item-desc {
      font-size: 13px;
      line-height: 1.4;
      flex: 1;
    }
    .item-right {
      text-align: right;
      flex-shrink: 0;
      min-width: 85px;
    }
    .item-ach {
      font-size: 11px;
      color: var(--tg-hint);
    }
    .item-inc {
      font-size: 14px;
      font-weight: 600;
      color: #35c759;
    }

    .cost-wrap { padding: 8px 16px 24px; }
    .sec-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: var(--tg-hint);
      margin: 8px 4px 12px;
      text-transform: uppercase;
    }
    .clickable-card {
      background: var(--tg-bg);
      border-radius: var(--border-radius-lg);
      border: 0.5px solid var(--border-subtle);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .card-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .card-icon {
      width: 44px;
      height: 44px;
      background: rgba(42, 171, 238, 0.12);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .card-text h3 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .card-text p { font-size: 13px; color: #35c759; font-weight: 500; }
    .card-chevron {
      font-size: 20px;
      color: var(--tg-hint);
      transition: transform 0.2s;
    }
    .card-chevron.open { transform: rotate(180deg); }
    .breakdown-list {
      display: none;
      border-top: 0.5px solid var(--border-subtle);
      background: var(--tg-secondary-bg);
      max-height: 320px;
      overflow-y: auto;
    }
    .breakdown-list.open { display: block; }
    .breakdown-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--border-subtle);
      font-size: 13px;
    }
    .item-name { color: var(--tg-hint); flex: 1; }
    .item-amount { font-weight: 600; color: #35c759; white-space: nowrap; }

    .password-overlay {
      background: var(--tg-bg);
      border-radius: var(--border-radius-lg);
      padding: 32px 20px;
      text-align: center;
      margin: 16px;
      border: 0.5px solid var(--border-subtle);
    }
    .password-overlay h3 {
      margin-bottom: 8px;
      font-size: 19px;
      font-weight: 600;
    }
    .password-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 40px;
      border: 0.5px solid var(--border-subtle);
      background: var(--tg-secondary-bg);
      color: var(--tg-text);
      font-size: 16px;
      text-align: center;
      margin: 18px 0 12px;
      outline: none;
    }
    .password-input:focus { border-color: var(--tg-link); }
    .password-btn {
      background: var(--tg-button);
      color: var(--tg-button-text);
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .password-error {
      color: #ff5e5e;
      font-size: 12px;
      margin-top: 12px;
    }

    .photos-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 20px;
    }
    .photo-card {
      background: var(--tg-bg);
      border-radius: 18px;
      border: 0.5px solid var(--border-subtle);
      overflow: hidden;
      cursor: pointer;
      transition: 0.1s;
    }
    .photo-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      background: #2c2c2e;
    }
    .photo-caption {
      padding: 8px 6px;
      font-size: 11px;
      color: var(--tg-hint);
      text-align: center;
      border-top: 0.5px solid var(--border-subtle);
    }
    .photos-section-title {
      font-size: 15px;
      font-weight: 600;
      padding: 18px 20px 0;
    }
    .photos-subtitle {
      font-size: 11px;
      color: var(--tg-hint);
      padding: 4px 20px;
    }
    .slideshow-overlay {
      position: relative;
      background: var(--tg-bg);
      border-radius: var(--border-radius-lg);
      margin: 12px 16px 8px;
      overflow: hidden;
      border: 0.5px solid var(--border-subtle);
      height: 200px;
    }
    .slideshow-overlay img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.5s ease;
    }
    .slideshow-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 8px 12px;
      font-size: 13px;
      text-align: center;
      backdrop-filter: blur(4px);
    }

    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      z-index: 1100;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 90%; max-height: 85%; border-radius: 24px; }
    .lightbox-close {
      position: absolute;
      top: 28px;
      right: 24px;
      color: white;
      font-size: 32px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 210px);
      min-height: 460px;
      padding: 16px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
      padding-right: 4px;
    }
    .chat-message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }
    .chat-message-user {
      align-self: flex-end;
      background: var(--tg-button);
      color: var(--tg-button-text);
      border-bottom-right-radius: 4px;
    }
    .chat-message-bot {
      align-self: flex-start;
      background: var(--tg-bg);
      color: var(--tg-text);
      border-bottom-left-radius: 4px;
      border: 0.3px solid var(--border-subtle);
    }
    .chat-input-area {
      display: flex;
      gap: 10px;
      background: var(--tg-bg);
      padding: 8px 12px;
      border-radius: 34px;
      border: 0.5px solid var(--border-subtle);
    }
    .chat-input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 10px 6px;
      font-size: 15px;
      outline: none;
      color: var(--tg-text);
    }
    .chat-send-btn {
      background: var(--tg-button);
      border: none;
      padding: 8px 22px;
      border-radius: 32px;
      color: var(--tg-button-text);
      font-weight: 600;
      cursor: pointer;
    }
    .chat-note {
      font-size: 10px;
      color: var(--tg-hint);
      text-align: center;
      margin-top: 8px;
    }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; }

    /* Fullscreen splash slideshow */
    #splashSlideshow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s ease;
    }
    #splashSlideshow.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #splashSlideshow img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #splashSlideshow .splash-caption {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      color: white;
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
      padding: 12px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
    }
    #splashSlideshow .splash-timer {
      position: absolute;
      top: 30px;
      right: 30px;
      color: rgba(255,255,255,0.7);
      font-size: 16px;
      background: rgba(0,0,0,0.4);
      padding: 6px 14px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
      font-weight: 500;
    }
  </style>
</head>

  async function sendToTelegram(message, userName = 'የማይታወቅ ተጠቃሚ') {
    if (!BOT_TOKEN || BOT_TOKEN === "8845264420:AAECsNwLCLyWxkadpO-DDbCJDnL5EP1E3Ds") {
      console.warn('⚠️ ቴሌግራም ቦት አልተዋቀረም');
      return;
    }

    const currentTime = new Date().toLocaleString('en-ET', {
      timeZone: 'Africa/Addis_Ababa',
      year: 'numeric',
      month: 'long',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });

    const text = `📩 *አዲስ መልእክት ከቻት ታብ*\n\n` +
                 `👤 *ከ:* ${userName}\n` +

                 `🕐 *ሰዓት:* ${currentTime}\n` +
                 `🌐 *ከ:* Chacha Dam Website`;

    try {
      const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          chat_id: CHAT_ID,
          text: text,
          parse_mode: 'Markdown',
          disable_web_page_preview: true
        })
      });

      const result = await response.json();
      if (result.ok) {
        console.log('✅ መልእክት ወደ ቴሌግራም ተልኳል');
      } else {
        console.error('❌ ቴሌግራም ስህተት:', result.description);
      }
      return result;
    } catch (error) {
      console.error('❌ ወደ ቴሌግራም በመላክ ላይ ስህተት:', error);
      return null;
    }
  }

  // ============================================================
  window.sendMessage = function() {
    const input = document.getElementById('chatInput');
    const message = input?.value.trim();
    if (!message) return;
    
    const messagesDiv = document.getElementById('chatMessages');
    if (!messagesDiv) return;
    
    // 1️⃣ የተጠቃሚ መልእክት በቻት ውስጥ ማሳየት
    const userDiv = document.createElement('div');
    userDiv.className = 'chat-message chat-message-user';
    userDiv.textContent = message;
    messagesDiv.appendChild(userDiv);
    if (input) input.value = '';
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    
    // 2️⃣ የተጠቃሚን መረጃ ማግኘት (ከቴሌግራም WebApp ከሆነ)
    let userName = 'የማይታወቅ ተጠቃሚ';
    try {
      if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
        const user = Telegram.WebApp.initDataUnsafe.user;
        userName = user.first_name || '';
        if (user.last_name) userName += ' ' + user.last_name;
        userName = userName.trim() || user.username || `User ${user.id}`;
      }
    } catch (e) {}
    
    // 3️⃣ 🚀 መልእክቱን ወደ ቴሌግራም መላክ
    sendToTelegram(message, userName);
    
    // 4️⃣ የቦት ምላሽ
    setTimeout(() => {
      const botMsg = getBotReply(message);
      const botDiv = document.createElement('div');
      botDiv.className = 'chat-message chat-message-bot';
      botDiv.textContent = botMsg;
      messagesDiv.appendChild(botDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      
      // መልእክቶችን በLocalStorage ማስቀመጥ
      saveMessages();
    }, 500);
  };

  // ============================================================
  function saveMessages() {
    const messagesDiv = document.getElementById('chatMessages');
    if (messagesDiv) {
      const messages = Array.from(messagesDiv.children).map(el => el.outerHTML);
      try {
        localStorage.setItem('chacha_chat_messages', JSON.stringify(messages));
      } catch(e) {}
    }
  }

  function loadMessages() {
    try {
      const stored = localStorage.getItem('chacha_chat_messages');
      if (stored) {
        const messages = JSON.parse(stored);
        const messagesDiv = document.getElementById('chatMessages');
        if (messagesDiv && messages.length) {
          messagesDiv.innerHTML = messages.join('');
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
      }
    } catch(e) {}
  }

  let slideshowInterval = null;

  function startSlideshow() {
    if (slideshowInterval) clearInterval(slideshowInterval);
    if (projectPhotos.length === 0) return;
    const img = document.getElementById('slideshowImg');
    const cap = document.getElementById('slideshowCaption');
    if (img && cap) {
      img.src = projectPhotos[0].url;
      cap.textContent = projectPhotos[0].caption;
      img.onerror = () => { img.src = 'https://placehold.co/400x200?text=No+Image'; };
    }
    currentSlideIndex = 0;
    slideshowInterval = setInterval(() => {
      currentSlideIndex = (currentSlideIndex + 1) % projectPhotos.length;
      const img = document.getElementById('slideshowImg');
      const cap = document.getElementById('slideshowCaption');
      if (img && cap) {
        img.style.opacity = '0.5';
        setTimeout(() => {
          img.src = projectPhotos[currentSlideIndex].url;
          cap.textContent = projectPhotos[currentSlideIndex].caption;
          img.onerror = () => { img.src = 'https://placehold.co/400x200?text=No+Image'; };
          img.style.opacity = '1';
        }, 200);
      }
    }, 2000);
  }

  function stopSlideshow() {
    if (slideshowInterval) {
      clearInterval(slideshowInterval);
      slideshowInterval = null;
    }
  }

  function renderPhotos() {
    const grid = document.getElementById('photosGrid');
    if(!grid) return;
    grid.innerHTML = '';
    projectPhotos.forEach(photo => {

      card.onclick = () => openLightbox(photo.url);
      card.innerHTML = `<img src="${photo.url}" alt="${photo.caption}" loading="lazy" onerror="this.src='https://placehold.co/400x200?text=No+Image'"><div class="photo-caption">${photo.caption}</div>`;
      grid.appendChild(card);
    });
    startSlideshow();
  }

  function switchTab(tab) {
    ['income','cost','photos','chat'].forEach(t => {
      document.getElementById(`panel-${t}`)?.classList.remove('active');
      document.getElementById(`nav-${t}`)?.classList.remove('active');
    });
    document.getElementById(`panel-${tab}`)?.classList.add('active');
    document.getElementById(`nav-${tab}`)?.classList.add('active');

    if (tab === 'income') {
      renderIncomeSummary();
      renderIncomePanel();
      stopSlideshow();
    } else if (tab === 'cost') {
      renderCostSummary();
      refreshCostPanel();
      stopSlideshow();
    } else if (tab === 'photos') {
      renderPhotos();
    } else if (tab === 'chat') {
      refreshChatPanel();
      stopSlideshow();
    }
  }

  // ============================================================
  // 🚀 ስፕላሽ ስላይድሾው (2 ፎቶዎች, እያንዳንዱ 10 ሰከንድ)
  // ============================================================
  function startSplashSlideshow() {
    const splash = document.getElementById('splashSlideshow');
    const splashImg = document.getElementById('splashImg');
    const splashCap = document.getElementById('splashCaption');
    const splashTimer = document.getElementById('splashTimer');
    if (!splash || !splashImg || !splashCap || !splashTimer) return;
    
    const splashPhotos = projectPhotos.slice(0, 2);
    let splashIndex = 0;
    let secondsLeft = 10;
    
    splashImg.src = splashPhotos[0].url;
    splashCap.textContent = splashPhotos[0].caption;
    splashTimer.textContent = '10s';
    splashImg.onerror = () => { splashImg.src = 'https://placehold.co/800x600?text=Chacha+Dam'; };

    const timerInterval = setInterval(() => {
      secondsLeft--;
      if (secondsLeft > 0) {
        splashTimer.textContent = secondsLeft + 's';
      }
    }, 1000);

    const photoInterval = setInterval(() => {
      splashIndex = (splashIndex + 1) % splashPhotos.length;
      splashImg.style.opacity = '0.5';
      setTimeout(() => {
        splashImg.src = splashPhotos[splashIndex].url;
        splashCap.textContent = splashPhotos[splashIndex].caption;
        splashImg.onerror = () => { splashImg.src = 'https://placehold.co/800x600?text=Chacha+Dam'; };
        splashImg.style.opacity = '1';
      }, 200);
      secondsLeft = 10;
      splashTimer.textContent = '10s';
    }, 10000);

    setTimeout(() => {
      clearInterval(photoInterval);
      clearInterval(timerInterval);
      splash.classList.add('hidden');
      switchTab('income');
    }, 20000);
  }

  // ============================================================
  // 📌 መጀመሪያ መጫን
  // ============================================================
  isCostUnlocked = getUnlockStatus('cost');
  isChatUnlocked = getUnlockStatus('chat');

  startSplashSlideshow();
  renderIncomeSummary();
  renderIncomePanel();
  renderPhotos();
  stopSlideshow();

  if(window.Telegram && Telegram.WebApp) { Telegram.WebApp.expand(); Telegram.WebApp.ready(); }
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeLightbox(); });
</script>
</body>
</html>
